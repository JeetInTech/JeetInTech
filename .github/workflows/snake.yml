name: Generate snake animation

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: JeetInTech
          outputs: |
            dist/snake.svg?color_snake=#ADFF2F&color_dots=#FFF9C4,#E5A88B,#C87D55,#A6522C,#7D2E14
            dist/snake-dark.svg?palette=github-dark&color_snake=#ADFF2F&color_dots=#1C190D,#5C1D06,#8B2A0C,#B63D18,#DC5328

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
