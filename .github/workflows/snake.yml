name: Generate snake animation

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: JeetInTech
          outputs: |
            dist/snake.svg?color_snake=#ADFF2F&color_dots=#ffffff,#d4f5a0,#9de84d,#6cc800,#4a9400
            dist/snake-dark.svg?palette=github-dark&color_snake=#ADFF2F&color_dots=#0d1117,#1a3300,#2d5c00,#4a9400,#6cc800

      - name: push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
